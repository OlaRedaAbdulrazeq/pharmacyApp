<!DOCTYPE html>
<html lang="en" ng-app="adminApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="js/angular.min.js"></script>
    <script src="js/angular-route.min.js"></script>
    <script src="adminApp.js"></script>
    <!-- Services -->
    <script src="services/AdminService.js"></script>
    <script src="services/ImgbbService.js"></script>
    <script src="services/AdminSharedService.js"></script>

    <!-- Directives -->
    <script src="directives/ImgHostDirective.js"></script>
    <script src="directives/NavbarDirective.js"></script>
    
    <!-- Controllers -->
    <script src="controllers/MainAdminScopeController.js"></script>
    <script src="controllers/AdminProductsController.js"></script>
    <script src="controllers/AdminAddProductController.js"></script>
    <script src="controllers/AdminDashboardController.js"></script>
    <script src="controllers/AdminViewCustomersController.js"></script>
    <script src="controllers/AdminViewPurchasesController.js"></script>
    <script src="controllers/AdminViewOrdersController.js"></script>
    <script src="controllers/AdminOutOfStockController.js"></script>

    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
      rel="stylesheet" 
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
      crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
            <custom-navbar></custom-navbar>
    </header>
    <main class="container-fluid">
        <div class="row g-4 bg-light">
            <aside class="col-12 col-md-3 col-lg-2 p-2 bg-white shadow" style="margin-top:1rem;">
                <nav aria-label="Sidebar Navigation" class="nav flex-row flex-md-column  h-100 side-nav rounded flex-nowrap p-2">
                    <span class="d-flex align-items-center justify-content-start p-2 mx-md-3 mx-lg-1 mt-md-3 mb-md-1 rounded" ng-class="{'active-link': isActive('/')}">
                        <i class="bi bi-speedometer me-2"></i>
                        <a href="#!/" class="text-dark text-decoration-none">Dashboard</a>
                    </span>
                    <span class="d-flex align-items-center justify-content-start p-2 mx-md-3 mt-md-3 mx-lg-1 mb-md-1 rounded" ng-class="{'active-link': isActive('/customers')}">
                        <i class="bi bi-people-fill me-2"></i>
                        <a href="#!customers" class="text-dark text-decoration-none">Customers</a>
                    </span>
                    <span class="d-flex align-items-center justify-content-start p-2 mx-md-3 mt-md-3 mx-lg-1 mb-md-1 rounded" ng-class="{'active-link': isActive('/purchases')}">
                        <i class="bi bi-cart-fill me-2"></i>
                        <a href="#!purchases" class="text-dark text-decoration-none" >Purchases</a>
                    </span>
                    <span class="d-flex align-items-center justify-content-start p-2 mx-md-3 mt-md-3 mx-lg-1 mb-md-1 rounded" ng-class="{'active-link': isActive('/products')}">
                        <i class="bi bi-box-seam-fill me-2"></i>
                        <a href="#!products" class="text-dark text-decoration-none">Products</a>
                    </span>
                    <span class="d-flex align-items-center justify-content-start p-2 mx-md-3 mt-md-3 mx-lg-1 mb-md-1 rounded" ng-class="{'active-link': isActive('/orders')}">
                        <i class="bi bi-truck me-2"></i>
                        <a href="#!orders" class="text-dark text-decoration-none">Orders</a>
                    </span>
                    <span class="d-flex align-items-center justify-content-start p-2 mx-md-3 mt-md-3 mx-lg-1 mb-md-1 rounded" ng-class="{'active-link': isActive('/outofstock')}">
                        <i class="bi bi-archive-fill me-2"></i>
                        <a href="#!outofstock" class="text-dark text-decoration-none">Out Of Stock</a>
                    </span>
                </nav>
            </aside>
            <section class="col-12 col-md-9 col-lg-10" ng-view ></section>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
