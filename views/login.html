<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="row g-0" style="min-height: 100%">
      <div class="col-md-6 d-none d-md-block">
        <img
          src="https://images.pexels.com/photos/5214953/pexels-photo-5214953.jpeg"
          style="width: 100%; height: 100vh; object-fit: cover"
        />
      </div>

      <div
        class="col-12 col-md-6 d-flex align-items-center justify-content-center"
      >
        <div style="width: 75%; min-height: 100vh">
          <h3 class="text-center mb-5 mt-5">
            <span style="color: rgb(0, 113, 188); font-weight: bold"
              >PHARMA</span
            ><span>CARE</span>
          </h3>

          <div class="card p-5" style="width: 100%; border-radius: 15px">
            <h3 class="text-center mb-1">Welcome Back!</h3>
            <p class="text-muted text-center mb-4">Login to your account</p>
            <label>Email</label>
            <input
              ng-model="email"
              type="email"
              class="form-control"
              placeholder="Enter your email"
            />
            <p ng-if="emailError" class="text-danger" style="font-size: 12px">
              {{emailError}}
            </p>
            <label class="mt-2">Password</label>
            <input
              ng-model="password"
              type="password"
              class="form-control"
              placeholder="Enter your password"
            />
            <p
              ng-if="passwordError"
              class="text-danger"
              style="font-size: 12px"
            >
              {{passwordError}}
            </p>

            <button
              ng-click="login()"
              class="btn w-100 mt-3"
              style="background-color: rgb(0, 113, 188); color: white"
            >
              Login
            </button>
          </div>
          <p class="text-secondary text-center">
            Don't have an Account,
            <b
              ><a href="#!/signup" class="text-secondary text-decoration-none"
                >Register now</a
              ></b
            >
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
